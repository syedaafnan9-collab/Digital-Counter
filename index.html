<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Digital Counter</title>
    <link rel="stylesheet" href="style.css" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  </head>
  <body >
    <div
      class="d-flex justify-content-center align-items-center min-vh-100 bg-black py-3 "
    >
      <div class="card bg-dark text-white" style="width: 400px; height: 400px;">
        <h1 class="text-center fs-1 pt-5">Counter</h1>
        <div class="card-body text-center">
          <p id="input" class="fs-1 pt-3">0</p>
          <button id="increase" class="btn  mt-4 fs-1"> + </button>
          <button id="decrease" class="btn  mt-4 fs-1"> - </button>
          <button id="reset" class="btn  mt-4 fs-1">Reset</button>
        </div>
      </div>
    </div>


    <script src="script.js"></script>
  </body>
</html>
